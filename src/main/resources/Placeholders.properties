#Alerts cron scheduler expression at 2:10 AM everyday
cron.expression.generate.alerts = 0 10 2 * * *

#sending alert mails every Monday at 8:10 AM 
cron.expression.sending.alert.mails = 0 10 8 * * MON

#sending alert mails every day based on alert_type at 8:10 AM 
cron.expression.sending.alert.mails.by.alert.type = 0 10 3 * * *

#User login timeout every 15 minutes 
cron.expression.user.login.timeout = 0 0/15 * * * *

#send issues every month 1st and 15th dates at 8 AM 
cron.expression.send.mail.with.open.issues =  0 0 8 1,15 * *

#sending user login report mail every Monday at 12:10 AM 
cron.expression.sending.user.login.report.mails = 0 10 12 * * MON

